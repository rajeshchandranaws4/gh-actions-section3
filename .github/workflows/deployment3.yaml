name: Deployment Exercise 3
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Test code
        run: npm run test
      
      - name: Build code
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: buildx  
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci
            
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: buildx  

      - name: List files
        run: ls -la    

      - name: Deploy code
        run: echo "Deploying..."